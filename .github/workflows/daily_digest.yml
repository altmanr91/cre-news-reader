name: Daily CRE Digest

on:
  schedule:
    - cron: '0 13 * * *'  # 9:00 AM EDT (UTC-4)
  workflow_dispatch:       # allow manual runs from GitHub UI

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install system dependencies
        run: sudo apt-get install -y libxml2-dev libxslt-dev

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install google-genai

      - name: Verify imports
        run: python -c "import google.genai; import feedparser; import newspaper; print('imports OK')"

      - name: Run digest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python digest.py
