name: Daily CRE Digest

on:
  schedule:
    - cron: '0 9 * * *'  # 5:00 AM EDT (UTC-4); early start accounts for GitHub Actions queue delays
  workflow_dispatch:       # allow manual runs from GitHub UI

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: sudo apt-get install -y libxml2-dev libxslt-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install google-genai feedparser python-dotenv pydantic requests "lxml[html_clean]" beautifulsoup4 newspaper3k

      - name: Run digest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_BASE_URL: https://news-reader-daily-digest.netlify.app
        run: python digest.py

      - name: Prepare site for Netlify
        run: |
          mkdir -p _site/articles
          cp digest_*.html _site/ 2>/dev/null || true
          cp articles/*.html _site/articles/ 2>/dev/null || true

      - name: Deploy to Netlify
        run: |
          npm install -g netlify-cli
          netlify deploy --prod --dir=_site
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
